<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Collecte Agadir{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

  {% block extra_css %}{% endblock %}
</head>
<body>

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
  <div class="container-fluid px-3">
    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard">
      <div class="brand-icon"><i class="bi bi-recycle"></i></div>
      <div>
        <span class="fw-bold">CollecteOpt</span>
        <small class="d-block opacity-75" style="font-size:0.65rem;letter-spacing:1px">AGADIR</small>
      </div>
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/carte' %}active{% endif %}" href="/carte">
            <i class="bi bi-map me-1"></i>Carte
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/tournees' %}active{% endif %}" href="/tournees">
            <i class="bi bi-truck me-1"></i>Tournées
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/camions' %}active{% endif %}" href="/camions">
            <i class="bi bi-truck-front me-1"></i>Camions
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/points' %}active{% endif %}" href="/points">
            <i class="bi bi-geo-alt me-1"></i>Points
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/alertes' %}active{% endif %}" href="/alertes">
            <i class="bi bi-bell me-1"></i>Alertes
            <span class="badge bg-danger ms-1 d-none" id="alertBadge">0</span>
          </a>
        </li>
        <li class="nav-item" id="navLogs" style="display:none">
          <a class="nav-link {% if request.path == '/logs' %}active{% endif %}" href="/logs">
            <i class="bi bi-shield-check me-1"></i>Logs
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-2">
        <!-- Dark mode -->
        <button class="btn btn-sm btn-outline-light rounded-pill" id="darkModeBtn" title="Mode sombre">
          <i class="bi bi-moon-stars"></i>
        </button>
        <!-- Connexion status -->
        <div class="d-flex align-items-center gap-2">
          <span class="badge bg-success" id="wsStatus">
            <i class="bi bi-wifi me-1"></i>Live
          </span>
          <div class="text-white">
            <small class="d-block opacity-75" id="userRoleBadge"></small>
            <small id="usernameBadge" class="fw-semibold"></small>
          </div>
          <button class="btn btn-sm btn-outline-light rounded-pill" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
{% endblock %}

<div class="main-wrapper">
  {% block content %}{% endblock %}
</div>

<!-- Toast notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
