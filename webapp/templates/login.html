<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — CollecteOpt</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 40px 36px;
            width: 380px;
            max-width: 90vw;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-card);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-brand .emoji {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .login-brand h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .login-brand p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .login-error {
            background: rgba(220, 38, 38, .06);
            border: 1px solid rgba(220, 38, 38, .15);
            color: var(--accent-red);
            padding: 10px 14px;
            border-radius: var(--radius-xs);
            font-size: 13px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input {
            padding: 12px 14px;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: var(--radius-xs);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-btn:hover {
            background: #222;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="emoji">🚛</div>
            <h1>CollecteOpt</h1>
            <p>Système d'Optimisation des Tournées</p>
        </div>

        {% if error %}
        <div class="login-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" class="form-input" placeholder="admin" autofocus required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Se connecter →</button>
        </form>
    </div>
</body>

</html>
